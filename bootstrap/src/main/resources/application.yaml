server:
  port: 9090
  servlet:
    context-path: /api/ragent

spring:
  application:
    name: ragent${unique-name:}-service

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

  datasource:
    driver-class-name: org.postgresql.Driver
    type: com.zaxxer.hikari.HikariDataSource
    username: ${POSTGRES_USERNAME:postgres}
    password: ${POSTGRES_PASSWORD:}
    url: ${POSTGRES_JDBC_URL:jdbc:postgresql://127.0.0.1:15432/ragent?client_encoding=UTF8}
    hikari:
      connection-timeout: 5000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 10
      minimum-idle: 5
      pool-name: RagentHikariPool

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:16379}

rocketmq:
  name-server: ${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
  producer:
    group: ragent-producer${unique-name:}_pg
    send-message-timeout: 2000

milvus:
  uri: ${MILVUS_URI:http://127.0.0.1:19530}

rag:
  vector:
    type: pg  # 可选 milvus / pg

  default:
    collection-name: rag_default_store
    dimension: 1024
    metric-type: COSINE
    sse-timeout-ms: 300000  # SSE 全局超时（毫秒），默认 5 分钟

  query-rewrite:
    enabled: true

  answer-citation:
    enabled: true

  rate-limit:
    global:
      enabled: true
      max-concurrent: 1
      max-wait-seconds: 3
      lease-seconds: 30
      poll-interval-ms: 200

  memory:
    history-keep-turns: 4
    summary-start-turns: 5
    summary-enabled: true
    summary-max-chars: 200
    title-max-length: 30

  semaphore:
    document-upload:
      name: rag:document:upload
      max-concurrent: 10
      max-wait-seconds: 5
      lease-seconds: 300

  knowledge:
    schedule:
      scan-delay-ms: 10000
      lock-seconds: 900
      batch-size: 20
      min-interval-seconds: 60

  mcp:
    servers:
      - name: default
        url: http://127.0.0.1:9099

  search:
    channels:
      vector-global:
        confidence-threshold: 0.6
        top-k-multiplier: 3
        min-score: 0.55
      intent-directed:
        min-intent-score: 0.4
        top-k-multiplier: 2
    rerank:
      min-score: 0.2

  trace:
    enabled: true
    max-error-length: 1000

ai:
  providers:
    newapi:
      url: ${NEWAPI_BASE_URL:http://127.0.0.1:3000}
      api-key: ${NEWAPI_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
    siliconflow:
      url: https://api.siliconflow.cn/v1
      api-key: ${SILICONFLOW_API_KEY:}
      endpoints:
        chat: /chat/completions
        embedding: /embeddings
        rerank: /rerank
    moyu:
      url: https://moyu.info
      api-key: ${MOYU_API_KEY:}
      endpoints:
        chat: /v1/chat/completions
    glm:
      url: http://43.139.76.84:8082
      api-key: ${ZHIPU_API_KEY:}
      format: anthropic
      endpoints:
        chat: /v1/messages
    mimo:
      url: https://token-plan-cn.xiaomimimo.com/anthropic
      api-key: ${MIMO_API_KEY:}
      format: anthropic
      endpoints:
        chat: /v1/messages
    gpt55:
      url: ${GPT55_BASE_URL:}
      api-key: ${GPT55_API_KEY:}
      format: openai
      thinking-parameter: reasoning_effort
      reasoning-effort: medium
      endpoints:
        chat: /v1/chat/completions

  selection:
    failure-threshold: 2
    open-duration-ms: 30000

  stream:
    message-chunk-size: 1

  chat:
    default-model: claude-opus
    deep-thinking-model: claude-opus
    internal-model: claude-opus
    candidates:
      - id: gpt-5.5
        provider: gpt55
        model: gpt-5.5
        supports-thinking: true
        priority: 1
      - id: claude-opus
        provider: moyu
        model: claude-opus-4-7
        supports-thinking: true
        priority: 1
      - id: claude-opus-newapi
        provider: newapi
        model: claude-opus-4-7
        supports-thinking: true
        priority: 1
      - id: glm-5.1
        provider: glm
        model: glm-5.1
        supports-thinking: true
        priority: 2
      - id: mimo-v2.5-pro
        provider: mimo
        model: mimo-v2.5-pro
        supports-thinking: true
        priority: 0

  embedding:
    default-model: bge-m3
    candidates:
      - id: bge-m3
        provider: siliconflow
        model: BAAI/bge-m3
        dimension: ${rag.default.dimension}
        priority: 1

  rerank:
    default-model: bge-reranker-v2-m3
    candidates:
      - id: bge-reranker-v2-m3
        provider: siliconflow
        model: BAAI/bge-reranker-v2-m3
        priority: 1

rustfs:
  url: ${RUSTFS_URL:http://127.0.0.1:9000}
  access-key-id: ${RUSTFS_ACCESS_KEY_ID:}
  secret-access-key: ${RUSTFS_SECRET_ACCESS_KEY:}

sa-token:
  token-name: Authorization
  timeout: 2592000
  is-concurrent: true
  is-share: false
  token-style: simple-uuid
  is-log: false
  is-print: false

app:
  demo-mode: false

logging:
  level:
    com.nageoffer.ai.ragent.rag: INFO
